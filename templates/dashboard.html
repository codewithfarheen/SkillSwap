<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="particles"></div>

<div class="container">

    <div class="card">

        <h1>Dashboard</h1>
        <p style="margin-bottom:20px; opacity:0.7;">
            Manage your skills and explore opportunities
        </p>

        <a href="/post-skill" class="btn-link">➕ Post a Skill</a>
        <a href="/skills" class="btn-link">📋 View Skills</a>
        <a href="/my-requests" class="btn-link">📩 My Requests</a>
        <a href="/logout" class="btn-link">🚪 Logout</a>

    </div>

</div>

<!-- PARTICLES SCRIPT -->
<script>
const particlesContainer = document.querySelector('.particles');

for (let i = 0; i < 40; i++) {
    let span = document.createElement('span');

    span.style.left = Math.random() * 100 + "vw";
    span.style.animationDuration = (Math.random() * 5 + 5) + "s";
    span.style.opacity = Math.random();

    particlesContainer.appendChild(span);
}
</script>

</body>
</html>
